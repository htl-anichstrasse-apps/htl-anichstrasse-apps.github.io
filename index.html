<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>HTL Anichstraße Apps</title>
    <script>
        (function () {
            var saved = sessionStorage.getItem('lang-override');
            var lang = saved || (navigator.language || navigator.userLanguage || 'en');
            if (lang.startsWith('de')) {
                window.location.replace('/de/');
            } else {
                window.location.replace('/en/');
            }
        })();
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0; url=/en/">
    </noscript>
</head>
<body>
</body>
</html>
