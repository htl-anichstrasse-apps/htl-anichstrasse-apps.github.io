<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Weiterleitung...</title>
    <script>
        (function() {
            const appDatabase = {
                "htlinn-go": {
                    ios: "https://apps.apple.com/at/app/htlinn-go/id6760402891",
                    android: "https://play.google.com/store/apps/details?id=at.ac.htlinn.htl_go"
                },
                "stratos2026": {
                    ios: "https://apps.apple.com/app/id987654321",
                    android: "https://play.google.com/store/apps/details?id=at.ac.htlinn.stud.stratos2026"
                },
                "kantine": {
                    ios: "https://apps.apple.com/app/id555666777",
                    android: "https://play.google.com/store/apps/details?id=at.ac.htlinn.kantine"
                }
            };

            const urlParams = new URLSearchParams(window.location.search);
            const appKey = urlParams.get('app');
            const fallbackUrl = "https://htl-anichstrasse-apps.github.io/";

            const userAgent = navigator.userAgent || navigator.vendor || window.opera || "";
            const platform = navigator.userAgentData?.platform || navigator.platform || "";
            const deviceFingerprint = (userAgent + " " + platform).toLowerCase();

            const isiOS = /ipad|iphone|ipod/.test(deviceFingerprint) && !window.MSStream;
            const isAndroid = /android/.test(deviceFingerprint);
            const isMacOS = /macintosh|mac os x|mac/.test(deviceFingerprint);
            const isWindows = /windows|win32|win64/.test(deviceFingerprint);
            const isLinuxLike = /linux|x11|cros/.test(deviceFingerprint);

            function getTargetUrl(targetApp) {
                if (isiOS || isMacOS) {
                    return targetApp.ios;
                }

                if (isAndroid || isWindows || isLinuxLike) {
                    return targetApp.android;
                }

                return targetApp.android;
            }

            if (appKey && appDatabase[appKey]) {
                const targetApp = appDatabase[appKey];
                const targetUrl = getTargetUrl(targetApp);
                const manualLink = document.getElementById("manual-redirect");

                if (manualLink) {
                    manualLink.href = targetUrl;
                }

                window.location.replace(targetUrl);
            } else {
                window.location.replace(fallbackUrl);
            }
        })();
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; color: #666; }
    </style>
</head>
<body>
    <p>Leite zum App Store weiter...</p>
    <p>Falls nichts passiert, klicken Sie bitte <a id="manual-redirect" href="https://htl-anichstrasse-apps.github.io/">hier</a>.</p>
</body>
</html>
