<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Weiterleitung...</title>
    <script>
        (function() {
            // 1. App-Datenbank: Hier einfach neue Apps hinzufügen
            const appDatabase = {
                "htlinn-go": {
                    ios: "https://apps.apple.com/at/app/htlinn-go/id6760402891",
                    android: "https://play.google.com/store/apps/details?id=at.ac.htlinn.htl_go"
                },
                "stratos2026": {
                    ios: "https://apps.apple.com/app/id987654321",
                    android: "https://play.google.com/store/apps/details?id=at.ac.htlinn.planer"
                },
                "kantine": {
                    ios: "https://apps.apple.com/app/id555666777",
                    android: "https://play.google.com/store/apps/details?id=at.ac.htlinn.kantine"
                }
            };

            // 2. Parameter aus der URL auslesen (z.B. ?app=wetter)
            const urlParams = new URLSearchParams(window.location.search);
            const appKey = urlParams.get('app');
            const fallbackUrl = "https://htl-anichstrasse-apps.github.io/";

            // 3. Gerät erkennen
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isiOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
            const isAndroid = /android/i.test(userAgent);

            // 4. Weiterleitungs-Logik
            if (appKey && appDatabase[appKey]) {
                const targetApp = appDatabase[appKey];
                if (isiOS) {
                    window.location.replace(targetApp.ios);
                } else if (isAndroid) {
                    window.location.replace(targetApp.android);
                } else {
                    // Desktop-Nutzer landen auf der Portfolio-Seite
                    window.location.replace(fallbackUrl);
                }
            } else {
                // Wenn kein Parameter oder falsche App-ID angegeben wurde
                window.location.replace(fallbackUrl);
            }
        })();
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; color: #666; }
    </style>
</head>
<body>
    <p>Leite zum App Store weiter...</p>
    <p>Falls nichts passiert, klicken Sie bitte <a href="https://htl-anichstrasse-apps.github.io/">hier</a>.</p>
</body>
</html>
