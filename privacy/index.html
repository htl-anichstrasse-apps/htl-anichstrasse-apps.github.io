<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        (function () {
            var saved = sessionStorage.getItem('lang-override');
            var lang = saved || (navigator.language || navigator.userLanguage || 'en');
            if (lang.startsWith('de')) {
                window.location.replace('/de/datenschutz/');
            } else {
                window.location.replace('/en/privacy/');
            }
        })();
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0; url=/en/privacy/">
    </noscript>
</head>
<body>
</body>
</html>
